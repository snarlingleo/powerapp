<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background:#09092d;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-family:system-ui, sans-serif;
  padding:24px 16px;
}

.titre {
  color:rgba(255,255,255,.5);
  font-size:11px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.14em;
  margin-bottom:18px;
  text-align:center;
}

/* ── Conteneur image ── */
.map-wrap {
  position:relative;
  display:inline-block;
  border-radius:16px;
  overflow:hidden;
  max-width:100%;
}

.map-wrap img {
  display:block;
  max-width:100%;
  height:auto;
  border-radius:16px;
}

/* ── Bandeau muscle sélectionné ── */
.muscle-info {
  margin-top:20px;
  min-height:44px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
  width:100%;
  max-width:600px;
}

.muscle-label {
  font-size:15px;
  font-weight:700;
  color:rgba(255,255,255,.9);
  text-align:center;
  min-height:22px;
  transition:all .2s;
}

.muscle-label span {
  color:#22c55e;
  font-size:17px;
}

/* ── Chips muscles sélectionnés ── */
.chips-wrap {
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  justify-content:center;
  min-height:32px;
}

.chip {
  padding:5px 14px;
  border-radius:99px;
  font-size:12px;
  font-weight:700;
  cursor:pointer;
  display:inline-flex;
  align-items:center;
  gap:6px;
  border:1px solid;
  transition:opacity .2s;
}
.chip:hover { opacity:.7; }

.empty-msg {
  font-size:12px;
  color:rgba(255,255,255,.28);
  font-style:italic;
}

/* ── Reset bouton ── */
.reset-btn {
  padding:7px 20px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.12);
  border-radius:99px;
  font-size:11px;
  font-weight:700;
  color:rgba(255,255,255,.4);
  cursor:pointer;
  transition:all .2s;
  display:none;
}
.reset-btn:hover {
  background:rgba(255,255,255,.1);
  color:white;
}

.powered {
  margin-top:24px;
  font-size:10px;
  color:rgba(255,255,255,.15);
}
</style>

<script>
// ══════════════════════════════════════════════
// CONFIG MUSCLES
// ══════════════════════════════════════════════
const CFG = {
  pectoraux:  { label:'Pectoraux',       r:34,  g:197, b:94  },
  deltoides:  { label:'Deltoïdes',       r:75,  g:75,  b:249 },
  biceps:     { label:'Biceps',          r:139, g:240, b:187 },
  avantbras:  { label:'Avant-bras',      r:139, g:240, b:187 },
  abdominaux: { label:'Abdominaux',      r:249, g:239, b:119 },
  quadriceps: { label:'Quadriceps',      r:255, g:141, b:150 },
  trapeze:    { label:'Trapèzes',        r:139, g:240, b:187 },
  dorsal:     { label:'Grand Dorsal',    r:75,  g:75,  b:249 },
  lombaires:  { label:'Lombaires',       r:191, g:161, b:255 },
  fessiers:   { label:'Fessiers',        r:255, g:141, b:150 },
  ischio:     { label:'Ischio-jambiers', r:249, g:239, b:119 },
  mollets:    { label:'Mollets',         r:191, g:161, b:255 }
};

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let selected = new Set();

// ══════════════════════════════════════════════
// INIT MAPHILIGHT
// ══════════════════════════════════════════════
$(document).ready(function() {

  // Init maphilight sur l'image
  $('#body-img').maphilight({
    fillColor:   '22c55e',  // vert néon par défaut hover
    fillOpacity: 0.35,
    stroke:      true,
    strokeColor: '22c55e',
    strokeOpacity: 0.8,
    strokeWidth: 2,
    fade:        true
  });

  // ── Appliquer couleur par muscle via data-maphilight ──
  $('area[data-muscle]').each(function() {
    const m   = $(this).data('muscle');
    const cfg = CFG[m];
    if (!cfg) return;

    const hex = rgbToHex(cfg.r, cfg.g, cfg.b);

    $(this).data('maphilight', {
      fillColor:     hex,
      fillOpacity:   0.35,
      stroke:        true,
      strokeColor:   hex,
      strokeOpacity: 0.85,
      strokeWidth:   2.5,
      fade:          true,
      alwaysOn:      false  // sera mis à true si sélectionné
    });
  });

  // ── Clic sur une zone ──
  $('area[data-muscle]').on('click', function(e) {
    e.preventDefault();
    const muscle = $(this).data('muscle');
    toggleMuscle(muscle);
  });

  // ── Hover → update label ──
  $('area[data-muscle]').on('mouseover', function() {
    const muscle = $(this).data('muscle');
    const cfg    = CFG[muscle];
    if (!cfg) return;

    if (!selected.has(muscle)) {
      document.getElementById('muscle-label').innerHTML =
        `Survol : <span>${cfg.label}</span>`;
    }
  });

  $('area[data-muscle]').on('mouseout', function() {
    majLabel();
  });

});

// ══════════════════════════════════════════════
// TOGGLE MUSCLE
// ══════════════════════════════════════════════
function toggleMuscle(muscle) {
  if (selected.has(muscle)) {
    selected.delete(muscle);
    // Désactiver alwaysOn pour ce muscle
    setAlwaysOn(muscle, false);
  } else {
    selected.add(muscle);
    // Activer alwaysOn pour ce muscle
    setAlwaysOn(muscle, true);
  }
  majLabel();
  majChips();
  try { navigator.vibrate(20); } catch(e) {}
}

// ══════════════════════════════════════════════
// ALWAYS ON (reste coloré après clic)
// ══════════════════════════════════════════════
function setAlwaysOn(muscle, on) {
  $(`area[data-muscle="${muscle}"]`).each(function() {
    const cfg = CFG[muscle];
    const hex = rgbToHex(cfg.r, cfg.g, cfg.b);

    $(this).data('maphilight', {
      fillColor:     hex,
      fillOpacity:   on ? 0.5 : 0.35,
      stroke:        true,
      strokeColor:   hex,
      strokeOpacity: on ? 1 : 0.85,
      strokeWidth:   on ? 3 : 2.5,
      fade:          true,
      alwaysOn:      on
    });

    // Forcer le refresh maphilight
    $(this).trigger('alwaysOn.maphilight');
  });

  // Refresh global
  $('#body-img').maphilight('options', {});
}

// ══════════════════════════════════════════════
// MAJ LABEL
// ══════════════════════════════════════════════
function majLabel() {
  const label = document.getElementById('muscle-label');

  if (selected.size === 0) {
    label.innerHTML = 'Survole ou clique un muscle';
    return;
  }

  const noms = [...selected]
    .map(m => CFG[m]?.label)
    .filter(Boolean)
    .filter((v, i, a) => a.indexOf(v) === i) // dédupliquer
    .join(', ');

  label.innerHTML = `Muscle(s) ciblé(s) : <span>${noms}</span>`;
}

// ══════════════════════════════════════════════
// MAJ CHIPS
// ══════════════════════════════════════════════
function majChips() {
  const wrap     = document.getElementById('chips-wrap');
  const resetBtn = document.getElementById('reset-btn');

  if (selected.size === 0) {
    wrap.innerHTML = `<span class="empty-msg">Aucun muscle sélectionné</span>`;
    resetBtn.style.display = 'none';
    return;
  }

  resetBtn.style.display = 'block';

  // Déduplique par label
  const vus = new Set();
  let html = '';

  selected.forEach(m => {
    const cfg = CFG[m];
    if (!cfg || vus.has(cfg.label)) return;
    vus.add(cfg.label);

    const hex = `rgb(${cfg.r},${cfg.g},${cfg.b})`;
    const hexA = `rgba(${cfg.r},${cfg.g},${cfg.b},0.15)`;

    html += `
      <span class="chip"
            onclick="toggleMuscle('${m}')"
            style="background:${hexA};
                   border-color:${hex};
                   color:${hex}">
        ${cfg.label}
        <span style="opacity:.5;font-size:10px">✕</span>
      </span>`;
  });

  wrap.innerHTML = html;
}

// ══════════════════════════════════════════════
// RESET
// ══════════════════════════════════════════════
function resetTout() {
  const muscles = [...selected];
  selected.clear();
  muscles.forEach(m => setAlwaysOn(m, false));
  majLabel();
  majChips();
}

// ══════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════
function rgbToHex(r, g, b) {
  return [r, g, b]
    .map(v => v.toString(16).padStart(2, '0'))
    .join('');
}

// ══════════════════════════════════════════════
// API EXTERNE (pour app.js)
// ══════════════════════════════════════════════
window.getMusclesCibles = () => [...selected];
window.setMusclesCibles = (arr) => {
  resetTout();
  (arr || []).forEach(m => {
    selected.add(m);
    setAlwaysOn(m, true);
  });
  majLabel();
  majChips();
};
</script>

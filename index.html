<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="theme-color" content="#020610"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>PowerApp ⚡</title>

  <!-- ✅ CYBER BLOCK — Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;700&display=swap" rel="stylesheet"/>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>

  <!-- ✅ CYBER BLOCK — CSS Variables injectées globalement -->
  <style>
    /* ═══════════════════════════════════════════════════
       CYBER BLOCK BLUE — Global CSS Override
       Remplace le système Foundever par Cyber Neon Blue
    ═══════════════════════════════════════════════════ */

    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;700&display=swap');

    :root {
      /* ── Cyber Blue Palette ── */
      --fd-indigo:      #0066ff;
      --fd-midnight:    #020610;
      --fd-white:       #ffffff;
      --fd-light-grey:  #060d20;
      --fd-lemon:       #00cfff;
      --fd-coral:       #7b00ff;
      --fd-lavender:    #0099ff;
      --fd-mint:        #00cfff;

      /* ── Cyber aliases ── */
      --cyber-blue1:    #00cfff;
      --cyber-blue2:    #0066ff;
      --cyber-blue3:    #001aff;
      --cyber-purple:   #7b00ff;
      --cyber-dark:     #020610;
      --cyber-card:     #030a18;

      /* ── App Structure ── */
      --bg-body:        #020610;
      --bg-card:        #030a18;
      --bg-input:       #040d20;
      --border-color:   rgba(0,100,255,0.15);
      --text-primary:   rgba(255,255,255,0.92);
      --text-secondary: rgba(200,220,255,0.7);
      --text-muted:     rgba(0,150,255,0.4);

      /* ── Typography ── */
      --font-display:   'Orbitron', monospace;
      --font-body:      'Rajdhani', sans-serif;

      /* ── Spacing (inchangé) ── */
      --space-xs:  4px;
      --space-sm:  8px;
      --space-md:  16px;
      --space-lg:  24px;
      --space-xl:  32px;

      /* ── Radius ── */
      --radius-sm:   8px;
      --radius-md:   12px;
      --radius-lg:   16px;
      --radius-xl:   20px;
      --radius-full: 9999px;

      /* ── Layout ── */
      --header-height: 56px;
      --nav-height:    70px;
    }

    /* ── Reset + Base ── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: var(--font-body);
      background: var(--cyber-dark);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      position: relative;
    }

    /* ── Scanlines effect ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(0,150,255,0.012) 0px,
        rgba(0,150,255,0.012) 1px,
        transparent 1px,
        transparent 3px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* ── Ambient glow ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 10% 90%, rgba(0,102,255,0.1) 0%, transparent 55%),
        radial-gradient(ellipse at 90% 10%, rgba(123,0,255,0.1) 0%, transparent 55%),
        radial-gradient(ellipse at 50% 50%, rgba(0,207,255,0.03) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Sparks particles ── */
    .cyber-spark {
      position: fixed;
      width: 2px;
      height: 8px;
      border-radius: 1px;
      background: linear-gradient(180deg, #00cfff, transparent);
      box-shadow: 0 0 6px #00cfff;
      pointer-events: none;
      z-index: 1;
      animation: spark-fall linear infinite;
    }

    @keyframes spark-fall {
      0%   { transform: translateY(-20px) translateX(0); opacity: 0.8; }
      100% { transform: translateY(100vh) translateX(var(--drift, 0px)); opacity: 0; }
    }

    /* ── Titres en Orbitron ── */
    h1, h2, h3,
    .card-label,
    .section-title,
    .nav-btn span,
    .header-title {
      font-family: var(--font-display) !important;
      letter-spacing: 0.05em;
    }

    /* ── Cards Cyber style ── */
    .card {
      background: var(--cyber-card) !important;
      border: 1px solid rgba(0,100,255,0.15) !important;
      border-radius: var(--radius-lg) !important;
      position: relative;
      overflow: hidden;
      transition: all 0.35s cubic-bezier(0.175,0.885,0.32,1.275);
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: -100%; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, #00cfff, #0066ff, transparent);
      transition: left 0.5s ease;
      z-index: 3;
    }

    .card:hover::before { left: 0; }

    /* ── Buttons Cyber ── */
    .btn-primary {
      background: linear-gradient(135deg, #0066ff, #001aff) !important;
      border: 1px solid rgba(0,207,255,0.3) !important;
      color: white !important;
      font-family: var(--font-display) !important;
      font-size: 0.7rem !important;
      letter-spacing: 0.1em !important;
      text-transform: uppercase !important;
      box-shadow: 0 0 20px rgba(0,102,255,0.4), 0 0 40px rgba(0,207,255,0.1) !important;
      transition: all 0.3s !important;
    }

    .btn-primary:hover {
      box-shadow: 0 0 30px rgba(0,207,255,0.6), 0 0 60px rgba(0,102,255,0.3) !important;
      transform: translateY(-2px) !important;
    }

    .btn-secondary {
      background: rgba(0,50,150,0.15) !important;
      border: 1px solid rgba(0,207,255,0.2) !important;
      color: var(--cyber-blue1) !important;
      font-family: var(--font-display) !important;
      font-size: 0.65rem !important;
      letter-spacing: 0.08em !important;
      text-transform: uppercase !important;
    }

    /* ── Inputs ── */
    .input {
      background: var(--bg-input) !important;
      border: 1px solid rgba(0,100,255,0.2) !important;
      color: var(--text-primary) !important;
      font-family: var(--font-body) !important;
    }

    .input:focus {
      border-color: var(--cyber-blue1) !important;
      box-shadow: 0 0 0 2px rgba(0,207,255,0.15) !important;
    }

    /* ── Chips ── */
    .chip {
      font-family: var(--font-display) !important;
      font-size: 0.55rem !important;
      letter-spacing: 0.06em !important;
      text-transform: uppercase !important;
    }

    .chip-indigo {
      background: rgba(0,102,255,0.15) !important;
      border: 1px solid rgba(0,207,255,0.25) !important;
      color: var(--cyber-blue1) !important;
    }

    .chip-lavender {
      background: rgba(0,153,255,0.12) !important;
      border: 1px solid rgba(0,153,255,0.25) !important;
      color: #0099ff !important;
    }

    /* ── Progress bars ── */
    .progress-bar {
      background: rgba(0,100,255,0.1) !important;
      border-radius: 99px;
      overflow: hidden;
      height: 6px;
    }

    .progress-fill {
      background: linear-gradient(90deg, #0066ff, #00cfff) !important;
      box-shadow: 0 0 8px rgba(0,207,255,0.5) !important;
      height: 100%;
      border-radius: 99px;
      transition: width 0.5s ease;
    }

    /* ── App Header Cyber ── */
    .app-header {
      background: rgba(2,6,16,0.97) !important;
      backdrop-filter: blur(20px) !important;
      border-bottom: 1px solid rgba(0,100,255,0.2) !important;
      box-shadow: 0 0 20px rgba(0,102,255,0.1) !important;
      font-family: var(--font-display) !important;
    }

    /* ── Nav Bar Cyber ── */
    .app-nav {
      background: rgba(2,6,16,0.97) !important;
      border-top: 1px solid rgba(0,100,255,0.15) !important;
    }

    /* ── Scrollbar Cyber ── */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb {
      background: rgba(0,150,255,0.3);
      border-radius: 2px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(0,207,255,0.5);
    }

    /* ── Animations ── */
    @keyframes cyber-pulse {
      0%,100% { box-shadow: 0 0 10px rgba(0,207,255,0.3); }
      50%      { box-shadow: 0 0 25px rgba(0,207,255,0.7), 0 0 50px rgba(0,102,255,0.3); }
    }

    @keyframes cyber-glow {
      0%,100% { filter: drop-shadow(0 0 5px #00cfff); }
      50%      { filter: drop-shadow(0 0 20px #00cfff) drop-shadow(0 0 40px #0066ff); }
    }

    @keyframes pageIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pageOut {
      from { opacity: 1; transform: translateY(0); }
      to   { opacity: 0; transform: translateY(-8px); }
    }

    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.5; transform: scale(1.3); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes fadeOut {
      from { opacity: 1; }
      to   { opacity: 0; }
    }

    @keyframes menuSlideDown {
      from { opacity: 0; transform: translateX(-50%) translateY(-10px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    @keyframes menuSlideUp {
      from { opacity: 1; transform: translateX(-50%) translateY(0); }
      to   { opacity: 0; transform: translateX(-50%) translateY(-10px); }
    }

    @keyframes headerEmojiPop {
      0%   { transform: scale(0.8) rotate(-10deg); }
      60%  { transform: scale(1.15) rotate(5deg); }
      100% { transform: scale(1) rotate(0deg); }
    }

    @keyframes neonScan {
      0%   { background-position: 0% 0%; }
      100% { background-position: 0% 100%; }
    }

    /* ── Splash Screen Cyber ── */
    #splash-screen {
      background: var(--cyber-dark) !important;
    }

    .splash-logo {
      font-family: var(--font-display) !important;
      color: var(--cyber-blue1) !important;
      filter: drop-shadow(0 0 20px #00cfff) !important;
      animation: cyber-glow 2s ease-in-out infinite !important;
    }

    /* ── Section titles ── */
    .section-title {
      font-family: var(--font-display) !important;
      font-size: 0.6rem !important;
      letter-spacing: 0.12em !important;
      text-transform: uppercase !important;
      color: rgba(0,150,255,0.5) !important;
    }

    /* ── Card label ── */
    .card-label {
      font-family: var(--font-display) !important;
      font-size: 0.55rem !important;
      letter-spacing: 0.1em !important;
      text-transform: uppercase !important;
      color: rgba(0,207,255,0.5) !important;
    }

    /* ── Toggle ── */
    .toggle-slider {
      background: rgba(0,100,255,0.2) !important;
    }

    input:checked + .toggle-slider {
      background: linear-gradient(135deg, #0066ff, #00cfff) !important;
      box-shadow: 0 0 10px rgba(0,207,255,0.4) !important;
    }

    /* ── Cyber corner brackets pour active elements ── */
    .active-cyber {
      position: relative;
    }

    .active-cyber::after,
    .active-cyber::before {
      content: '';
      position: absolute;
      width: 10px; height: 10px;
      border-color: #00cfff;
      border-style: solid;
      opacity: 0.6;
    }

    .active-cyber::before {
      top: 4px; left: 4px;
      border-width: 2px 0 0 2px;
    }

    .active-cyber::after {
      bottom: 4px; right: 4px;
      border-width: 0 2px 2px 0;
    }
  </style>

  <link rel="stylesheet" href="styles.css"/>
</head>

<body>

<!-- ✅ CYBER SPARKS — Particules générées au load -->
<script>
  (function() {
    for (let i = 0; i < 20; i++) {
      const s = document.createElement('div');
      s.className = 'cyber-spark';
      s.style.left = Math.random() * 100 + 'vw';
      s.style.animationDuration = (4 + Math.random() * 10) + 's';
      s.style.animationDelay = (Math.random() * 15) + 's';
      s.style.setProperty('--drift', (Math.random() * 60 - 30) + 'px');
      s.style.opacity = Math.random() * 0.3 + 0.05;
      const size = Math.random() * 1.5 + 0.5;
      s.style.width = size + 'px';
      document.body.appendChild(s);
    }
  })();
</script>

<!-- APP WRAPPER -->
<div id="app-wrapper" style="display:none; flex-direction:column; height:100vh; position:relative; z-index:1;">

  <!-- HEADER -->

    position:fixed; top:0; left:50%; transform:translateX(-50%);

    height:var(--header-height);
    background:rgba(2,6,16,0.97);

    border-bottom:1px solid rgba(0,100,255,0.2);

    padding:0 16px;
    z-index:200;
    box-shadow:0 0 20px rgba(0,102,255,0.1);
  ">
    <!-- Left — Menu -->

            onclick="MenuGlobal.toggle()"
            style="
              width:36px; height:36px;
              background:rgba(0,50,150,0.15);
              border:1px solid rgba(0,207,255,0.15);
              border-radius:8px;
              color:rgba(0,207,255,0.7);
              font-size:1rem;
              cursor:pointer;
              display:flex; align-items:center; justify-content:center;
              font-family:'Orbitron',monospace;
              transition:all 0.3s;
            "
            onmouseenter="this.style.borderColor='rgba(0,207,255,0.5)';this.style.boxShadow='0 0 10px rgba(0,207,255,0.3)'"
            onmouseleave="this.style.borderColor='rgba(0,207,255,0.15)';this.style.boxShadow=''">
      ☰

    <!-- Center — Logo -->
    <div style="display:flex; align-items:center; gap:8px;">

        animation:cyber-glow 3s ease-in-out infinite;

      <span id="header-title" style="
        font-family:'Orbitron',monospace;

<!-- ✅ SPLASH PROGRESS ANIMATION -->
<script>
(function() {
  const bar = document.getElementById('splash-progress');
  const lbl = document.getElementById('splash-label');
  const steps = [
    [20, 'MODULES...'],
    [45, 'PROFIL...'],
    [70, 'DONNÉES...'],
    [90, 'INTERFACE...'],
    [100, 'PRÊT ⚡']
  ];
  let i = 0;
  const run = () => {
    if (i >= steps.length) return;
    const [w, t] = steps[i++];
    if (bar) bar.style.width = w + '%';
    if (lbl) {
      lbl.style.opacity = '0';
      setTimeout(() => {
        lbl.textContent = t;
        lbl.style.opacity = '1';
      }, 150);
    }
    setTimeout(run, 300);
  };
  setTimeout(run, 200);
})();
</script>

<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0,
                 viewport-fit=cover" />
  <meta name="theme-color" content="#09092d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style"
        content="black-translucent" />
  <meta name="description"
        content="PowerApp — Ton coach fitness personnel" />

  <title>PowerApp ⚡</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="./manifest.json" />

  <!-- CSS -->
  <link rel="stylesheet" href="./css/style.css" />

  <!-- Chart.js — AVANT tous les scripts -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/maphilight@1.4.0/jquery.maphilight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/image-map-resizer@1.0.10/js/imageMapResizer.min.js"></script>

</head>

<body>

  <!-- ══════════════════════════════════════════
       SPLASH SCREEN
  ══════════════════════════════════════════ -->
  <div id="splash-screen">
  <div style="
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    min-height:100vh;gap:20px;
    background:var(--bg-app, #070714);
  ">

    <!-- Logo animé avec rings -->
    <div style="position:relative;width:100px;height:100px;
                display:flex;align-items:center;justify-content:center">

      <!-- Ring 1 -->
      <div style="
        position:absolute;inset:0;border-radius:50%;
        border:2px solid transparent;
        border-top-color:#4b4bf9;
        border-right-color:#8bf0bb;
        animation:splashSpin 1.5s linear infinite;
      "></div>

      <!-- Ring 2 -->
      <div style="
        position:absolute;inset:8px;border-radius:50%;
        border:2px solid transparent;
        border-bottom-color:#f9ef77;
        border-left-color:#ff8d96;
        animation:splashSpin 2s linear infinite reverse;
      "></div>

      <!-- Icône centrale -->
      <div style="
        font-size:3rem;
        filter:drop-shadow(0 0 20px #4b4bf9);
        animation:splashIconPulse 2s ease-in-out infinite;
        position:relative;z-index:1;
      ">⚡</div>
    </div>

    <!-- Titre -->
    <div style="text-align:center">
      <div style="
        font-size:2rem;font-weight:900;
        background:linear-gradient(135deg,#fff 0%,#4b4bf9 100%);
        -webkit-background-clip:text;
        -webkit-text-fill-color:transparent;
        background-clip:text;
        font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      ">PowerApp</div>
      <div style="
        font-size:.82rem;color:rgba(255,255,255,0.4);
        margin-top:4px;
        font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      ">Ton coach fitness personnel</div>
    </div>

    <!-- Barre de chargement -->
    <div style="
      width:200px;height:4px;
      background:rgba(255,255,255,0.06);
      border-radius:99px;overflow:hidden;
    ">
      <div style="
        height:100%;width:0%;
        background:linear-gradient(90deg,#4b4bf9,#8bf0bb);
        border-radius:99px;
        animation:splashLoad 2.5s ease forwards;
        box-shadow:0 0 10px #4b4bf9;
      "></div>
    </div>

    <!-- Dots animés -->
    <div style="display:flex;gap:6px">
      <div style="width:6px;height:6px;border-radius:50%;background:#4b4bf9;
                  animation:splashDot 1.2s ease-in-out infinite;
                  animation-delay:0s"></div>
      <div style="width:6px;height:6px;border-radius:50%;background:#8bf0bb;
                  animation:splashDot 1.2s ease-in-out infinite;
                  animation-delay:.2s"></div>
      <div style="width:6px;height:6px;border-radius:50%;background:#f9ef77;
                  animation:splashDot 1.2s ease-in-out infinite;
                  animation-delay:.4s"></div>
      <div style="width:6px;height:6px;border-radius:50%;background:#ff8d96;
                  animation:splashDot 1.2s ease-in-out infinite;
                  animation-delay:.6s"></div>
    </div>

    <div style="
      font-size:.65rem;color:rgba(255,255,255,0.2);
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    ">Chargement des modules...</div>

  </div>

  <!-- CSS animations splash -->
  <style>
    @keyframes splashSpin {
      to { transform:rotate(360deg); }
    }
    @keyframes splashIconPulse {
      0%,100% {
        transform:scale(1);
        filter:drop-shadow(0 0 20px #4b4bf9);
      }
      50% {
        transform:scale(1.1);
        filter:drop-shadow(0 0 35px #4b4bf9);
      }
    }
    @keyframes splashLoad {
      0%  { width:0%;   }
      30% { width:40%;  }
      70% { width:75%;  }
      100%{ width:100%; }
    }
    @keyframes splashDot {
      0%,100% { transform:translateY(0);   opacity:.4; }
      50%     { transform:translateY(-8px);opacity:1;  }
    }
  </style>
</div>

  <!-- ══════════════════════════════════════════
       ONBOARDING
  ══════════════════════════════════════════ -->
  <div id="onboarding-screen" class="onboarding hidden"></div>

  <!-- ══════════════════════════════════════════
       APP WRAPPER
  ══════════════════════════════════════════ -->
  <div id="app-wrapper" style="display:none">

    <!-- HEADER -->
    <header class="app-header">
      <div class="header-left">
        <span class="header-emoji" id="header-emoji">⚡</span>
        <span class="header-title" id="header-title">PowerApp</span>
      </div>
      <div class="header-right">
  <div id="header-xp" class="header-xp"></div>
  <button id="btn-menu-global"
        onclick="MenuGlobal.toggle()"
        style="width:36px;height:36px;
               border-radius:50%;
               border:1px solid var(--border-color);
               background:var(--bg-input);
               font-size:1rem;
               display:flex;align-items:center;
               justify-content:center;
               cursor:pointer;
               transition:all .2s">
  ☰
</button>
</div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="app-main" id="app-main">

      <!-- Pages principales -->
      <div id="page-home"     class="page"></div>
      <div id="page-training" class="page"></div>
      <div id="page-live"     class="page"></div>
      <div id="page-stats"    class="page"></div>
      <div id="page-profil"   class="page"></div>

      <!-- Pages secondaires -->
      <div id="page-coach"        class="page"></div>
      <div id="page-defis"        class="page"></div>
      <div id="page-predict"      class="page"></div>
      <div id="page-share"        class="page"></div>
      <div id="page-gamification" class="page"></div>
      <div id="page-history"      class="page"></div>
      <div id="page-photos"       class="page"></div>
      <div id="page-social"       class="page"></div>
      <div id="page-supersets"    class="page"></div>
      <div id="page-offline"      class="page"></div>
      <div id="page-settings"     class="page"></div>
      <div id="page-nutrition"    class="page"></div>
      <div id="page-journal"      class="page"></div>
      <div id="page-objectifs"    class="page"></div>
      <div id="page-blessures"    class="page"></div>

      <!-- ✅ NOUVELLES PAGES -->
      <div id="page-circuit"      class="page"></div>
      <div id="page-adaptatif"    class="page"></div>
      <div id="page-galerie"      class="page"></div>

    </main>

    <!-- NAVIGATION BAS -->
    <nav class="app-nav">
      <button class="nav-btn active" id="nav-home"
              onclick="naviguer('home')">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">Accueil</span>
      </button>
      <button class="nav-btn" id="nav-training"
              onclick="naviguer('training')">
        <span class="nav-icon">📅</span>
        <span class="nav-label">Programme</span>
      </button>
      <button class="nav-btn nav-btn-live" id="nav-live"
              onclick="naviguer('live')">
        <span class="nav-icon">⚡</span>
        <span class="nav-label">Live</span>
      </button>
      <button class="nav-btn" id="nav-stats"
              onclick="naviguer('stats')">
        <span class="nav-icon">📊</span>
        <span class="nav-label">Stats</span>
      </button>
      <button class="nav-btn" id="nav-nutrition"
              onclick="naviguer('nutrition')">
        <span class="nav-icon">🥗</span>
        <span class="nav-label">Nutrition</span>
      </button>
    </nav>

  </div><!-- /app-wrapper -->

  <!-- ══════════════════════════════════════════
       CHRONO STICKY — Injecté par ChronoSticky.afficher()
  ══════════════════════════════════════════ -->
  <!-- Créé dynamiquement dans app.js -->

  <!-- ══════════════════════════════════════════
       MODAL INFO (résumé séance, détail exercice)
  ══════════════════════════════════════════ -->
  <div id="modal-info" class="modal hidden">
    <div class="modal-overlay"
         onclick="document.getElementById('modal-info')
                    .classList.add('hidden')">
    </div>
    <div class="modal-inner">
      <button class="modal-close" id="modal-info-close">✕</button>
      <div class="modal-content" id="modal-info-content"></div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════
       MODAL CONFIRMATION
  ══════════════════════════════════════════ -->
  <div id="modal-confirm" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-inner modal-sm">
      <div class="modal-content" id="modal-confirm-content">
        <div style="text-align:center;padding:var(--space-md)">
          <div style="font-size:1.1rem;font-weight:700;
                      margin-bottom:var(--space-sm)"
               id="modal-confirm-title">
            Confirmer
          </div>
          <p style="font-size:.85rem;color:var(--text-muted);
                    margin-bottom:var(--space-lg)"
             id="modal-confirm-msg"></p>
          <div style="display:grid;grid-template-columns:1fr 1fr;
                      gap:var(--space-sm)">
            <button id="modal-confirm-cancel"
                    class="btn-secondary">
              Annuler
            </button>
            <button id="modal-confirm-ok"
                    class="btn-primary">
              Confirmer
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════
       TOAST CONTAINER
  ══════════════════════════════════════════ -->
  <div id="toast-container"></div>

  <!-- ══════════════════════════════════════════
       CONFETTI CANVAS
  ══════════════════════════════════════════ -->
  <canvas id="confetti-canvas"></canvas>

  <!-- ══════════════════════════════════════════
       TIMER REPOS OVERLAY
  ══════════════════════════════════════════ -->
  <div id="timer-repos-overlay"></div>

  <!-- ══════════════════════════════════════════
       BANNIÈRES SYSTÈME
  ══════════════════════════════════════════ -->

  <!-- Offline -->
  <div id="offline-banner"
       style="display:none;
              position:fixed;top:0;left:50%;
              transform:translateX(-50%);
              width:100%;max-width:480px;
              background:var(--fd-coral);
              color:white;text-align:center;
              padding:6px;font-size:.75rem;
              font-weight:700;z-index:9999">
    📵 Mode hors-ligne
  </div>

  <!-- Sync -->
  <div id="sync-indicator"
       style="display:none;
              position:fixed;top:0;left:50%;
              transform:translateX(-50%);
              width:100%;max-width:480px;
              background:var(--fd-indigo);
              color:white;text-align:center;
              padding:6px;font-size:.75rem;
              font-weight:700;z-index:9999">
    🔄 Synchronisation...
  </div>

  <!-- PWA Install -->
  <div id="pwa-install-btn" style="display:none"></div>

<!-- Update Banner -->
<div id="update-banner"
     style="display:none;
            position:fixed;
            bottom:calc(var(--nav-height) + 8px);
            left:50%;
            transform:translateX(-50%);
            width:calc(100% - 32px);
            max-width:448px;
            background:var(--bg-card);
            border:1px solid var(--fd-lemon);
            border-radius:var(--radius-xl);
            padding:var(--space-md);
            align-items:center;
            justify-content:space-between;
            gap:var(--space-sm);
            box-shadow:var(--shadow-lg);
            z-index:200">
  <span style="font-size:.82rem;font-weight:600">
    🆕 Nouvelle version disponible !
  </span>
  <button onclick="window._swReg?.waiting
                     ?.postMessage({type:'SKIP_WAITING'})"
          class="btn-primary btn-sm">
    Mettre à jour
  </button>
</div>

  <!-- ══════════════════════════════════════════
       SCRIPTS — Ordre critique respecté
  ══════════════════════════════════════════ -->

 <!-- Modules de base -->

  <!-- ══════════════════════════════════════════
       SERVICE WORKER
  ══════════════════════════════════════════ -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => {
            window._swReg = reg;
            reg.addEventListener('updatefound', () => {
              const newSW = reg.installing;
              newSW.addEventListener('statechange', () => {
                if (newSW.state === 'installed'
                    && navigator.serviceWorker.controller) {
                  const banner =
                    document.getElementById('update-banner');
                  if (banner) banner.style.display = 'flex';
                }
              });
            });
          })
          .catch(err => console.warn('[SW]', err));

        navigator.serviceWorker.addEventListener(
          'controllerchange', () => window.location.reload()
        );
      });
    }
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr" data-theme-style="cyber-blue">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0,
                 viewport-fit=cover"/>
  <meta name="theme-color" content="#020610"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style"
        content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="PowerApp"/>
  <meta name="description"
        content="PowerApp — Ton coach fitness personnel"/>

  <title>PowerApp ⚡</title>

  <!-- ✅ Manifest -->
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="assets/icon-192.png"/>

  <!-- ✅ Fonts Cyber — EN PREMIER -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap"
        rel="stylesheet"/>
 
  <!-- ✅ CSS -->
   <link rel="stylesheet" href="./css/style.css" />

    <!-- Chart.js — AVANT tous les scripts -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/maphilight@1.4.0/jquery.maphilight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/image-map-resizer@1.0.10/js/imageMapResizer.min.js"></script>

  <!-- ✅ Thème appliqué immédiatement avant tout rendu -->
  <script>
    (function() {
      const t = localStorage.getItem('ft_theme_style') || 'cyber-blue';
      document.documentElement.setAttribute('data-theme-style', t);
    })();
  </script>

</head>

<body>

  <!-- ════════════════════════════════════════════════════
       SPLASH SCREEN
  ════════════════════════════════════════════════════ -->
  <div id="splash-screen">
    <div class="splash-content">
      <div class="splash-logo">⚡</div>
      <div class="splash-title">PowerApp</div>
      <div class="splash-subtitle">Ton coach fitness personnel</div>
      <div class="splash-loader">
        <div class="splash-bar"></div>
      </div>
    </div>
  </div>

  <!-- ════════════════════════════════════════════════════
       ONBOARDING
  ════════════════════════════════════════════════════ -->
  <div id="onboarding-screen" class="onboarding hidden"></div>

  <!-- ════════════════════════════════════════════════════
       APP WRAPPER
  ════════════════════════════════════════════════════ -->
  <div id="app-wrapper" style="display:none">

    <!-- ── HEADER CYBER BLOCK ── -->
    <header class="app-header" id="app-header">

      <!-- Cyber elements -->
      <div class="cb-left-bar"   id="cb-left-bar"></div>
      <div class="cb-ambient"    id="cb-ambient"></div>
      <div class="cb-top-stripe" id="cb-top-stripe"></div>
      <div class="cb-corner cb-corner-tl"></div>
      <div class="cb-corner cb-corner-tr"></div>
      <div class="cb-corner cb-corner-bl"></div>
      <div class="cb-corner cb-corner-br"></div>

      <!-- Left -->
      <div class="cb-header-left">
        <div class="cb-icon-bubble" id="cb-icon-bubble">
          <span id="header-emoji">⚡</span>
        </div>
        <div class="cb-header-text">
          <div class="cb-header-meta">
            <span class="cb-cat-label" id="header-cat">CORE</span>
            <div class="cb-dot"        id="cb-dot"></div>
            <span class="cb-key-label" id="cb-key">HOME</span>
          </div>
          <div class="cb-header-title" id="header-title">PowerApp</div>
        </div>
      </div>

      <!-- Right -->
      <div class="cb-header-right">
        <div class="cb-xp-badge" id="header-xp"></div>
        <!-- <div class="cb-badge"    id="cb-badge">HOME</div>-->
        <button class="cb-menu-btn"
                id="btn-menu-global"
                onclick="MenuGlobal.toggle()">☰</button>
      </div>

    </header>

    <!-- ── MAIN ── -->
    <main class="app-main" id="app-main">

      <!-- Pages -->
      <div id="page-home"         class="page"></div>
      <div id="page-training"     class="page"></div>
      <div id="page-live"         class="page"></div>
      <div id="page-stats"        class="page"></div>
      <div id="page-coach"        class="page"></div>
      <div id="page-defis"        class="page"></div>
      <div id="page-predict"      class="page"></div>
      <div id="page-calculateur"  class="page"></div>
      <div id="page-share"        class="page"></div>
      <div id="page-gamification" class="page"></div>
      <div id="page-history"      class="page"></div>
      <div id="page-photos"       class="page"></div>
      <div id="page-social"       class="page"></div>
      <div id="page-supersets"    class="page"></div>
      <div id="page-offline"      class="page"></div>
      <div id="page-settings"     class="page"></div>
      <div id="page-nutrition"    class="page"></div>
      <div id="page-circuit"      class="page"></div>
      <div id="page-adaptatif"    class="page"></div>
      <div id="page-galerie"      class="page"></div>
      <div id="page-journal"      class="page"></div>
      <div id="page-objectifs"    class="page"></div>
      <div id="page-themes"       class="page"></div>
      <div id="page-export"       class="page"></div>
      <div id="page-sounds"       class="page"></div>
      <div id="page-blessures"    class="page"></div>
      <div id="page-profil"       class="page"></div>
      <div id="page-mon_profil"   class="page"></div>

    </main>

    <!-- ── NAV BAS ── -->
    <nav class="app-nav" id="app-nav"></nav>

  </div><!-- /app-wrapper -->

  <!-- ════════════════════════════════════════════════════
       CHRONO STICKY
  ════════════════════════════════════════════════════ -->
  <div id="chrono-sticky" class="hidden"></div>

  <!-- ════════════════════════════════════════════════════
       MODALS
  ════════════════════════════════════════════════════ -->

  <!-- Modal Info / Planning / Résumé -->
  <div id="modal-info" class="modal hidden">
    <div class="modal-overlay"
         onclick="document.getElementById('modal-info')
                  .classList.add('hidden')"></div>
    <div class="modal-inner">
      <button class="modal-close"
              id="modal-info-close">✕</button>
      <div class="modal-content"
           id="modal-info-content"></div>
    </div>
  </div>

  <!-- Modal Confirmation -->
  <div id="modal-confirm" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-inner modal-sm">
      <div class="modal-content" id="modal-confirm-content">
        <div style="text-align:center;padding:var(--space-lg)">
          <div style="font-size:1.5rem;margin-bottom:var(--space-md)"
               id="modal-confirm-icon">⚠️</div>
          <div style="font-size:1rem;font-weight:700;
                      margin-bottom:var(--space-sm)"
               id="modal-confirm-title">
            Confirmer
          </div>
          <p style="font-size:.82rem;color:var(--text-muted);
                    margin-bottom:var(--space-lg)"
             id="modal-confirm-msg"></p>
          <div style="display:flex;gap:var(--space-sm)">
            <button id="modal-confirm-cancel"
                    class="btn-secondary"
                    style="flex:1">
              Annuler
            </button>
            <button id="modal-confirm-ok"
                    class="btn-primary"
                    style="flex:1">
              Confirmer
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ════════════════════════════════════════════════════
       TOAST CONTAINER
  ════════════════════════════════════════════════════ -->
  <div id="toast-container"></div>

  <!-- ════════════════════════════════════════════════════
       CANVAS CONFETTI
  ════════════════════════════════════════════════════ -->
  <canvas id="confetti-canvas"
          style="position:fixed;inset:0;
                 pointer-events:none;z-index:9999">
  </canvas>

  <!-- ════════════════════════════════════════════════════
       BANNERS
  ════════════════════════════════════════════════════ -->
  <div id="offline-banner"
       style="display:none;position:fixed;bottom:80px;
              left:50%;transform:translateX(-50%);
              background:rgba(0,20,60,0.95);
              border:1px solid rgba(0,207,255,0.25);
              border-radius:var(--radius-full);
              padding:8px 16px;font-size:.75rem;
              color:rgba(0,207,255,0.7);z-index:500;
              backdrop-filter:blur(12px)">
    📵 Mode hors-ligne
  </div>

  <div id="sync-banner"
       style="display:none;position:fixed;bottom:80px;
              left:50%;transform:translateX(-50%);
              background:rgba(0,20,60,0.95);
              border:1px solid rgba(0,207,255,0.25);
              border-radius:var(--radius-full);
              padding:8px 16px;font-size:.75rem;
              color:rgba(0,207,255,0.7);z-index:500;
              backdrop-filter:blur(12px)">
    🔄 Synchronisation...
  </div>

  <!-- ════════════════════════════════════════════════════
       UPDATE BANNER
  ════════════════════════════════════════════════════ -->
  <div id="update-banner"
       style="display:none;position:fixed;top:0;left:0;right:0;
              background:linear-gradient(135deg,#0066ff,#00cfff);
              color:#020610;padding:10px 16px;
              display:none;align-items:center;
              justify-content:space-between;z-index:9999;
              font-family:'Orbitron',monospace;font-size:9px;
              letter-spacing:2px">
    <span>🆕 NOUVELLE VERSION DISPONIBLE !</span>
    <button onclick="window.location.reload()"
            style="background:rgba(0,0,0,0.2);
                   border:1px solid rgba(0,0,0,0.3);
                   border-radius:6px;padding:4px 10px;
                   font-family:'Orbitron',monospace;
                   font-size:8px;cursor:pointer;
                   color:#020610;letter-spacing:1px">
      METTRE À JOUR
    </button>
  </div>

  <!-- ════════════════════════════════════════════════════
       SCRIPTS — Ordre obligatoire
  ════════════════════════════════════════════════════ -->

  <!-- 1. Utils de base -->
  <script src="js/utils.js"></script>
  <script src="js/i18n.js"></script>

  <!-- 2. Core data -->
  <script src="js/tracker.js"></script>
  <script src="js/programme.js"></script>
  <script src="js/chrono.js"></script>

  <!-- 3. Modules métier -->
  <script src="js/gamification.js"></script>
  <script src="js/nutrition.js"></script>
  <script src="js/coach.js"></script>
  <script src="js/predict.js"></script>
  <script src="js/stats.js"></script>
  <script src="js/history.js"></script>
  <script src="js/photos.js"></script>
  <script src="js/defis.js"></script>
  <script src="js/social.js"></script>
  <script src="js/superset.js"></script>
  <script src="js/circuit.js"></script>
  <script src="js/hiit.js"></script>
  <script src="js/calculateur.js"></script>
  <script src="js/export.js"></script>
  <script src="js/share.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/offline.js"></script>
  <script src="js/video.js"></script>

  <!-- 4. UI Premium -->
  <script src="js/ui-premium.js"></script>

  <!-- 5. App principal — EN DERNIER -->
  <!-- ✅ themes.js SUPPRIMÉ → Themes est dans app.js -->
  <script src="js/app.js"></script>

  <!-- ════════════════════════════════════════════════════
       SERVICE WORKER
  ════════════════════════════════════════════════════ -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker
          .register('/sw.js')
          .then(reg => {
            reg.addEventListener('updatefound', () => {
              const newWorker = reg.installing;
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed'
                    && navigator.serviceWorker.controller) {
                  const banner =
                    document.getElementById('update-banner');
                  if (banner) banner.style.display = 'flex';
                }
              });
            });
          })
          .catch(e => console.warn('SW:', e));
      });
    }
  </script>

</body>
</html>

  <style>
    /* ═══════════════════════════════════════════════
       CYBER BLOCK BLUE — Injected Global Styles
    ═══════════════════════════════════════════════ */

    :root {
      --fd-indigo:      #0066ff;
      --fd-midnight:    #020610;
      --fd-lemon:       #00cfff;
      --fd-coral:       #7b00ff;
      --fd-lavender:    #0099ff;
      --fd-mint:        #00cfff;
      --cyber-blue1:    #00cfff;
      --cyber-blue2:    #0066ff;
      --cyber-purple:   #7b00ff;
      --cyber-dark:     #020610;
      --cyber-card:     #030a18;
      --bg-app:         #020610;
      --bg-card:        rgba(3,10,24,0.95);
      --bg-input:       rgba(0,50,150,0.08);
      --text-muted:     rgba(0,150,255,0.45);
      --border-color:   rgba(0,100,255,0.15);
    }

    /* Scanlines */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(0,150,255,0.012) 0px,
        rgba(0,150,255,0.012) 1px,
        transparent 1px, transparent 3px
      );
      pointer-events: none; z-index: 9999;
    }

    /* Ambient glow */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse at 10% 90%, rgba(0,102,255,0.1) 0%, transparent 55%),
        radial-gradient(ellipse at 90% 10%, rgba(123,0,255,0.1) 0%, transparent 55%),
        radial-gradient(ellipse at 50% 50%, rgba(0,207,255,0.03) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }

    /* Sparks */
    .cyber-spark {
      position: fixed;
      width: 2px; height: 8px;
      border-radius: 1px;
      background: linear-gradient(180deg, #00cfff, transparent);
      box-shadow: 0 0 6px #00cfff;
      pointer-events: none; z-index: 1;
      animation: spark-fall linear infinite;
    }

    @keyframes spark-fall {
      0%   { transform: translateY(-20px) translateX(0); opacity: 0.8; }
      100% { transform: translateY(100vh) translateX(var(--drift,0px)); opacity: 0; }
    }

    @keyframes cyber-glow {
      0%,100% { filter: drop-shadow(0 0 5px #00cfff); }
      50%      { filter: drop-shadow(0 0 20px #00cfff) drop-shadow(0 0 40px #0066ff); }
    }

    @keyframes cyber-progress {
      0%   { width: 0%; }
      100% { width: 100%; }
    }
  </style>
</head>

<!-- ✅ CYBER SPARKS -->
<script>
(function() {
  for (let i = 0; i < 20; i++) {
    const s = document.createElement('div');
    s.className = 'cyber-spark';
    s.style.left = Math.random() * 100 + 'vw';
    s.style.animationDuration = (4 + Math.random() * 10) + 's';
    s.style.animationDelay = (Math.random() * 15) + 's';
    s.style.setProperty('--drift', (Math.random() * 60 - 30) + 'px');
    s.style.opacity = Math.random() * 0.3 + 0.05;
    const size = Math.random() * 1.5 + 0.5;
    s.style.width = size + 'px';
    document.body.appendChild(s);
  }
})();
</script>

<!-- ✅ SPLASH PROGRESS -->
<script>
(function() {
  const bar = document.getElementById('splash-bar');
  const lbl = document.getElementById('splash-label');
  const steps = [
    [20,  'MODULES...'],
    [45,  'PROFIL...'],
    [70,  'DONNÉES...'],
    [90,  'INTERFACE...'],
    [100, 'PRÊT ⚡']
  ];
  let i = 0;
  const run = () => {
    if (i >= steps.length) return;
    const [w, t] = steps[i++];
    if (bar) bar.style.width = w + '%';
    if (lbl) {
      lbl.style.opacity = '0';
      setTimeout(() => {
        lbl.textContent = t;
        lbl.style.opacity = '1';
      }, 150);
    }
    setTimeout(run, 350);
  };
  setTimeout(run, 300);
})();
</script>

<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0,
                 viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style"
        content="black-translucent" />
  <meta name="theme-color" content="#09092d" />
  <title>PowerApp ⚡</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- ═══════════════════════════════════════
       SPLASH SCREEN
  ════════════════════════════════════════ -->
  <div id="splash-screen">
    <div class="splash-content">
      <div class="splash-logo">⚡</div>
      <div class="splash-title">PowerApp</div>
      <div class="splash-subtitle">Ton coach fitness personnel</div>
      <div class="splash-loader">
        <div class="splash-bar"></div>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════
       ONBOARDING
  ════════════════════════════════════════ -->
  <div id="onboarding-screen" class="onboarding hidden"></div>

  <!-- ═══════════════════════════════════════
       APP WRAPPER
  ════════════════════════════════════════ -->
  <div id="app-wrapper" style="display:none">

    <!-- HEADER -->
    <header class="app-header">
      <div class="header-left">
        <span class="header-emoji" id="header-emoji">⚡</span>
        <span class="header-title" id="header-title">PowerApp</span>
      </div>
      <div class="header-right">
        <div class="header-xp" id="header-xp"></div>

        <!-- ✅ FIX — id="btn-menu" + SANS onclick inline -->
        <button class="header-icon-btn"
                id="btn-menu"
                aria-label="Menu">
          <svg width="16" height="4" viewBox="0 0 16 4"
               fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="2"  cy="2" r="2" fill="currentColor"/>
            <circle cx="8"  cy="2" r="2" fill="currentColor"/>
            <circle cx="14" cy="2" r="2" fill="currentColor"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- MENU DROPDOWN -->
    <div id="app-menu" class="app-menu hidden">
      <div class="app-menu-inner">
        <!-- ✅ FIX — onclick sur les items : pas de capture:true
             donc ils reçoivent bien les clics -->
        <div class="menu-item"
             onclick="naviguer('settings')">
          ⚙️ Paramètres
        </div>
        <div class="menu-item"
             onclick="naviguer('offline')">
          📵 Mode hors-ligne
        </div>
        <div class="menu-item"
             onclick="naviguer('social')">
          📱 Partage réseaux
        </div>
        <div class="menu-item"
             onclick="Utils.exporterJSON();UI.fermerMenu()">
          📤 Exporter données
        </div>
        <div class="menu-separator"></div>
        <div class="menu-item menu-danger"
             onclick="UI.fermerMenu();UI.confirmerReset()">
          🗑️ Réinitialiser
        </div>
      </div>
    </div>

    <!-- PAGES -->
    <main class="app-main">
      <div id="page-home"     class="page active"></div>
      <div id="page-training" class="page"></div>
      <div id="page-live"     class="page"></div>
      <div id="page-stats"    class="page"></div>
      <div id="page-profil"   class="page"></div>

      <div id="page-coach"        class="page"></div>
      <div id="page-defis"        class="page"></div>
      <div id="page-predict"      class="page"></div>
      <div id="page-share"        class="page"></div>
      <div id="page-gamification" class="page"></div>
      <div id="page-history"      class="page"></div>
      <div id="page-photos"       class="page"></div>
      <div id="page-social"       class="page"></div>
      <div id="page-supersets"    class="page"></div>
      <div id="page-offline"      class="page"></div>
      <div id="page-settings"     class="page"></div>
      <div id="page-nutrition"    class="page"></div>
      <div id="page-mon_profil"   class="page"></div>
      <div id="page-journal"      class="page"></div>
      <div id="page-objectifs"    class="page"></div>
      <div id="page-blessures"    class="page"></div>
    </main>

    <!-- NAV BAS -->
    <nav class="app-nav">
      <button class="nav-btn active" id="nav-home"
              onclick="naviguer('home')">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">Accueil</span>
      </button>
      <button class="nav-btn" id="nav-training"
              onclick="naviguer('training')">
        <span class="nav-icon">📅</span>
        <span class="nav-label">Programme</span>
      </button>
      <button class="nav-btn nav-btn-live" id="nav-live"
              onclick="naviguer('live')">
        <span class="nav-icon">⚡</span>
        <span class="nav-label">Live</span>
      </button>
      <button class="nav-btn" id="nav-stats"
              onclick="naviguer('stats')">
        <span class="nav-icon">📊</span>
        <span class="nav-label">Stats</span>
      </button>
      <button class="nav-btn" id="nav-profil"
              onclick="naviguer('profil')">
        <span class="nav-icon">👤</span>
        <span class="nav-label">Profil</span>
      </button>
    </nav>

  </div><!-- fin #app-wrapper -->


  <!-- ═══════════════════════════════════════
       MODALS
  ════════════════════════════════════════ -->

  <!-- Modal Info / Résumé séance -->
  <div id="modal-info" class="modal hidden">
    <div class="modal-overlay"
         onclick="document.getElementById('modal-info')
                    .classList.add('hidden')">
    </div>
    <div class="modal-inner modal-sm">
      <button class="modal-close" id="modal-info-close">✕</button>
      <div class="modal-content" id="modal-info-content"></div>
    </div>
  </div>

  <!-- Modal Confirmation -->
  <div id="modal-confirm" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-inner modal-sm">
      <div class="modal-content">
        <div style="font-size:1.1rem;font-weight:700;
                    margin-bottom:var(--space-sm)"
             id="modal-confirm-titre">
          Confirmer
        </div>
        <p style="font-size:.85rem;color:var(--text-muted);
                  margin-bottom:var(--space-lg)"
           id="modal-confirm-msg"></p>
        <div style="display:grid;grid-template-columns:1fr 1fr;
                    gap:var(--space-sm)">
          <button id="modal-confirm-non"
                  class="btn-secondary">
            Annuler
          </button>
          <button id="modal-confirm-oui"
                  class="btn-primary">
            Confirmer
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════
       OVERLAYS GLOBAUX
  ════════════════════════════════════════ -->

  <!-- Confetti canvas -->
  <canvas id="confetti-canvas"></canvas>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <!-- Timer repos overlay -->
  <div id="timer-repos-overlay" class="hidden"></div>

  <!-- Offline banner -->
  <div id="offline-banner" class="hidden"
       style="position:fixed;bottom:calc(var(--nav-height) + 8px);
              left:var(--space-md);right:var(--space-md);
              z-index:300;background:#333;color:white;
              border-radius:var(--radius-md);
              padding:var(--space-sm) var(--space-md);
              font-size:.78rem;font-weight:600;
              display:none;align-items:center;gap:var(--space-sm)">
    📵 Mode hors-ligne
  </div>

  <!-- Sync indicator -->
  <div id="sync-indicator" class="hidden"
       style="position:fixed;top:calc(var(--header-height) + 8px);
              right:var(--space-md);z-index:300;
              background:var(--fd-indigo);color:white;
              border-radius:var(--radius-full);
              padding:4px 12px;font-size:.72rem;font-weight:600;
              display:none;align-items:center;gap:4px">
    🔄 Synchronisation...
  </div>

  <!-- PWA Install button -->
  <div id="pwa-install-btn" class="hidden"></div>

  <!-- Update banner -->
  <div id="update-banner"
       style="display:none;
              position:fixed;
              bottom:calc(var(--nav-height) + 16px);
              left:var(--space-md);
              right:var(--space-md);
              z-index:300;
              background:var(--fd-indigo);
              color:white;
              border-radius:var(--radius-lg);
              padding:var(--space-md);
              align-items:center;
              justify-content:space-between;
              box-shadow:var(--shadow-lg);
              gap:var(--space-sm)">
    <span style="font-size:.82rem;font-weight:600">
      🆕 Nouvelle version disponible !
    </span>
    <button id="update-btn"
            style="padding:6px 14px;
                   background:white;
                   color:var(--fd-indigo);
                   border:none;
                   border-radius:var(--radius-full);
                   font-size:.78rem;font-weight:700;
                   cursor:pointer">
      Mettre à jour
    </button>
  </div>


  <!-- ═══════════════════════════════════════
       SCRIPTS
  ════════════════════════════════════════ -->
  <script src="js/sounds.js"        defer></script>
  <script src="js/utils.js"         defer></script>
  <script src="js/tracker.js"       defer></script>
  <script src="js/programme.js"     defer></script>
  <script src="js/gamification.js"  defer></script>
  <script src="js/coach.js"         defer></script>
  <script src="js/notifications.js" defer></script>
  <script src="js/defis.js"         defer></script>
  <script src="js/predict.js"       defer></script>
  <script src="js/share.js"         defer></script>
  <script src="js/stats.js"         defer></script>
  <script src="js/history.js"       defer></script>
  <script src="js/photos.js"        defer></script>
  <script src="js/superset.js"      defer></script>
  <script src="js/offline.js"       defer></script>
  <script src="js/social.js"        defer></script>
  <script src="js/i18n.js"          defer></script>
  <script src="js/app.js"           defer></script>

  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => {
            reg.addEventListener('updatefound', () => {
              const newSW = reg.installing;
              newSW.addEventListener('statechange', () => {
                // ✅ FIX — Afficher bannière SEULEMENT
                // si un SW précédent contrôle déjà la page
                if (newSW.state === 'installed'
                    && navigator.serviceWorker.controller) {
                  const banner =
                    document.getElementById('update-banner');
                  if (banner) banner.style.display = 'flex';
                }
              });
            });
          })
          .catch(err => console.warn('[SW]', err));

        navigator.serviceWorker.addEventListener(
          'controllerchange', () => window.location.reload()
        );
      });
    }
  </script>

</body>
</html>
